<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>C Compiler</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0d0f12;
    --surface:  #13161b;
    --border:   #1f2430;
    --accent:   #4ade80;
    --accent2:  #22d3ee;
    --err:      #f87171;
    --text:     #cdd6f4;
    --muted:    #6c7086;
    --bar-h:    44px;
  }

  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace; }

  #app { display: flex; flex-direction: column; height: 100vh; }

  #topbar {
    height: var(--bar-h);
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 0 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  #topbar .logo {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: .08em;
    color: var(--accent);
    text-transform: uppercase;
    user-select: none;
  }
  #topbar .logo span { color: var(--muted); font-weight: 400; }

  #topbar .spacer { flex: 1; }

  #status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--muted);
    transition: background .3s;
    flex-shrink: 0;
  }
  #status-dot.compiling { background: #facc15; box-shadow: 0 0 6px #facc1580; }
  #status-dot.running   { background: var(--accent); box-shadow: 0 0 6px #4ade8060; }
  #status-dot.error     { background: var(--err); box-shadow: 0 0 6px #f8717180; }

  #status-label { font-size: 11px; color: var(--muted); min-width: 70px; }

  #server-wrap {
    display: flex; align-items: center; gap: 6px;
  }
  #server-input {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: inherit;
    font-size: 11px;
    padding: 4px 8px;
    width: 300px;
    outline: none;
    transition: border-color .2s;
  }
  #server-input:focus { border-color: var(--accent2); }
  #server-input.connected { border-color: var(--accent); }

  button {
    cursor: pointer;
    border: none;
    border-radius: 4px;
    font-family: inherit;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: .04em;
    padding: 6px 14px;
    transition: opacity .15s, transform .1s;
  }
  button:active { transform: scale(.97); }
  button:disabled { opacity: .4; cursor: default; }

  #btn-run  { background: var(--accent);  color: #0d0f12; }
  #btn-stop { background: var(--err);     color: #0d0f12; display: none; }
  #btn-clear { background: transparent; border: 1px solid var(--border); color: var(--muted); }

  #main {
    display: flex;
    flex: 1;
    min-height: 0;
  }

  #editor-wrap {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
  }
  #editor-bar {
    height: 28px; display: flex; align-items: center;
    padding: 0 14px; gap: 8px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    font-size: 11px; color: var(--muted);
  }
  #editor-bar .tab {
    color: var(--text); background: var(--bg);
    padding: 2px 10px; border-radius: 3px 3px 0 0;
    border: 1px solid var(--border); border-bottom: none;
    font-size: 11px;
  }
  #editor { flex: 1; }

  #divider {
    width: 4px;
    background: var(--border);
    cursor: col-resize;
    flex-shrink: 0;
    transition: background .2s;
  }
  #divider:hover { background: var(--accent2); }

  #terminal-wrap {
    width: 380px;
    min-width: 180px;
    display: flex;
    flex-direction: column;
    background: #0a0c0f;
  }
  #terminal-bar {
    height: 28px; display: flex; align-items: center;
    padding: 0 10px; gap: 8px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    font-size: 11px; color: var(--muted);
  }
  #terminal-bar .dot { width: 8px; height: 8px; border-radius: 50%; }
  #terminal-bar .term-label { flex: 1; }

  #btn-copy {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 3px;
    font-weight: 600;
    letter-spacing: .04em;
    cursor: pointer;
    transition: color .2s, border-color .2s;
  }
  #btn-copy:hover { color: var(--accent2); border-color: var(--accent2); }
  #btn-copy.copied { color: var(--accent); border-color: var(--accent); }

  #terminal { flex: 1; padding: 6px 4px; overflow: hidden; }

  #conn-banner {
    display: none;
    position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 18px;
    font-size: 12px;
    color: var(--muted);
    z-index: 99;
  }
  #conn-banner.show { display: block; }
  #conn-banner.ok   { border-color: var(--accent); color: var(--accent); }
  #conn-banner.fail { border-color: var(--err); color: var(--err); }
</style>
</head>
<body>
<div id="app">

  <div id="topbar">
    <div class="logo">C<span>/</span>run</div>

    <div id="server-wrap">
      <input id="server-input" type="text" spellcheck="false">
    </div>

    <div class="spacer"></div>

    <div id="status-dot"></div>
    <div id="status-label">desconectado</div>

    <button id="btn-clear">Limpar</button>
    <button id="btn-stop">■ Parar</button>
    <button id="btn-run">▶ Executar</button>
  </div>

  <div id="main">
    <div id="editor-wrap">
      <div id="editor-bar">
        <div class="tab">main.c</div>
      </div>
      <div id="editor"></div>
    </div>

    <div id="divider"></div>

    <div id="terminal-wrap">
      <div id="terminal-bar">
        <div class="dot" style="background:#f87171"></div>
        <div class="dot" style="background:#facc15"></div>
        <div class="dot" style="background:#4ade80"></div>
        <span class="term-label" style="margin-left:4px">terminal</span>
        <button id="btn-copy">Copiar</button>
      </div>
      <div id="terminal"></div>
    </div>
  </div>
</div>

<div id="conn-banner"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>

<script type="module">
import { Terminal } from 'https://cdn.jsdelivr.net/npm/xterm@5.3.0/+esm';
import { FitAddon } from 'https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/+esm';

const term = new Terminal({
  theme: {
    background: '#0a0c0f',
    foreground: '#cdd6f4',
    cursor:      '#4ade80',
    selectionBackground: '#4ade8030',
    black:   '#1e1e2e', brightBlack:   '#585b70',
    red:     '#f38ba8', brightRed:      '#f38ba8',
    green:   '#a6e3a1', brightGreen:    '#a6e3a1',
    yellow:  '#f9e2af', brightYellow:   '#f9e2af',
    blue:    '#89b4fa', brightBlue:     '#89b4fa',
    magenta: '#cba6f7', brightMagenta: '#cba6f7',
    cyan:    '#89dceb', brightCyan:     '#89dceb',
    white:   '#bac2de', brightWhite:    '#a6adc8',
  },
  fontFamily: "'JetBrains Mono','Fira Code',monospace",
  fontSize: 13,
  lineHeight: 1.4,
  cursorBlink: true,
  scrollback: 2000,
  allowProposedApi: true,
});
const fitAddon = new FitAddon();
term.loadAddon(fitAddon);
term.open(document.getElementById('terminal'));
setTimeout(() => fitAddon.fit(), 100);

let inputBuffer = '';
term.onKey(({ key, domEvent }) => {
  const code = domEvent.keyCode;
  if (code === 13) {
    ws && wsSend('input', inputBuffer + '\n');
    term.write('\r\n');
    inputBuffer = '';
  } else if (code === 8) {
    if (inputBuffer.length > 0) {
      inputBuffer = inputBuffer.slice(0, -1);
      term.write('\b \b');
    }
  } else if (key.length === 1) {
    inputBuffer += key;
    term.write(key);
  }
});

new ResizeObserver(() => fitAddon.fit()).observe(document.getElementById('terminal'));

// ── Botao Copiar ──
const btnCopy = document.getElementById('btn-copy');
btnCopy.addEventListener('click', () => {
  const lines = [];
  for (let i = 0; i < term.buffer.length; i++) {
    const line = term.buffer.getLine(i);
    if (line) {
      const text = line.translateToString(true).trimEnd();
      lines.push(text);
    }
  }
  const texto = lines.join('\n').trim();
  if (!texto) return;
  navigator.clipboard.writeText(texto).then(() => {
    btnCopy.textContent = 'Copiado!';
    btnCopy.classList.add('copied');
    setTimeout(() => {
      btnCopy.textContent = 'Copiar';
      btnCopy.classList.remove('copied');
    }, 1500);
  });
});

// ── Monaco ──
require.config({ paths: { vs: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs' }});
let editor;
require(['vs/editor/editor.main'], () => {
  monaco.editor.defineTheme('crun', {
    base: 'vs-dark',
    inherit: true,
    rules: [
      { token: 'keyword',   foreground: 'cba6f7', fontStyle: 'bold' },
      { token: 'string',    foreground: 'a6e3a1' },
      { token: 'number',    foreground: 'fab387' },
      { token: 'comment',   foreground: '6c7086', fontStyle: 'italic' },
      { token: 'type',      foreground: '89dceb' },
    ],
    colors: {
      'editor.background':           '#0d0f12',
      'editor.foreground':           '#cdd6f4',
      'editorLineNumber.foreground': '#45475a',
      'editorLineNumber.activeForeground': '#cdd6f4',
      'editor.selectionBackground':  '#4ade8025',
      'editor.lineHighlightBackground': '#13161b',
      'editorCursor.foreground':     '#4ade80',
      'editorIndentGuide.background1': '#1f2430',
      'editorWidget.background':     '#13161b',
    }
  });

  editor = monaco.editor.create(document.getElementById('editor'), {
    value: '#include <stdio.h>\n\nint main() {\n    char nome[64];\n    printf("Digite seu nome: ");\n    scanf("%s", nome);\n    printf("Ola, %s!\\n", nome);\n    return 0;\n}\n',
    language: 'c',
    theme: 'crun',
    fontFamily: "'JetBrains Mono','Fira Code',monospace",
    fontSize: 14,
    lineHeight: 22,
    minimap: { enabled: false },
    scrollBeyondLastLine: false,
    renderLineHighlight: 'gutter',
    smoothScrolling: true,
    padding: { top: 12 },
    tabSize: 4,
    insertSpaces: true,
    wordWrap: 'on',
  });

  new ResizeObserver(() => editor.layout()).observe(document.getElementById('editor'));
});

// ── Divider ──
const divider = document.getElementById('divider');
const termWrap = document.getElementById('terminal-wrap');
let dragging = false;
divider.addEventListener('mousedown', () => { dragging = true; document.body.style.cursor = 'col-resize'; });
document.addEventListener('mousemove', (e) => {
  if (!dragging) return;
  const appRect = document.getElementById('main').getBoundingClientRect();
  const newW = Math.max(180, Math.min(appRect.width - 300, appRect.right - e.clientX));
  termWrap.style.width = newW + 'px';
  fitAddon.fit();
  editor && editor.layout();
});
document.addEventListener('mouseup', () => { dragging = false; document.body.style.cursor = ''; });

// ── WebSocket ──
let ws = null;
const statusDot   = document.getElementById('status-dot');
const statusLabel = document.getElementById('status-label');
const btnRun      = document.getElementById('btn-run');
const btnStop     = document.getElementById('btn-stop');
const serverInput = document.getElementById('server-input');
const banner      = document.getElementById('conn-banner');

// URL padrao do seu Render - conecta automaticamente
const DEFAULT_SERVER = 'wss://c-compiler-vxh0.onrender.com';

function showBanner(msg, type) {
  banner.textContent = msg;
  banner.className = 'show ' + type;
  setTimeout(() => banner.className = '', 3000);
}

function setStatus(s) {
  statusDot.className = s;
  const labels = { idle: 'pronto', compiling: 'compilando', running: 'rodando', error: 'erro' };
  statusLabel.textContent = labels[s] || s;
  const busy = s === 'running' || s === 'compiling';
  btnRun.style.display  = busy ? 'none' : '';
  btnStop.style.display = busy ? '' : 'none';
  btnRun.disabled = !ws || ws.readyState !== WebSocket.OPEN;
}

function wsSend(type, data) {
  if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type, data }));
}

function connect(url) {
  if (ws) { ws.close(); ws = null; }
  try { ws = new WebSocket(url); } catch { showBanner('URL invalida', 'fail'); return; }

  ws.onopen = () => {
    serverInput.classList.add('connected');
    showBanner('Conectado', 'ok');
    setStatus('idle');
  };
  ws.onclose = () => {
    serverInput.classList.remove('connected');
    setStatus('');
    statusLabel.textContent = 'desconectado';
    btnRun.disabled = true;
  };
  ws.onerror = () => showBanner('Erro de conexao', 'fail');

  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    if (msg.type === 'status') {
      setStatus(msg.data);
    } else if (msg.type === 'output') {
      term.write(msg.data.replace(/\n/g, '\r\n'));
    } else if (msg.type === 'compile_error') {
      setStatus('error');
      term.write('\r\n\x1b[1;31m── Erro de compilacao ──\x1b[0m\r\n');
      term.write(msg.data.replace(/\n/g, '\r\n'));
    }
  };
}

// Salva no localStorage se o usuario digitar uma URL diferente
serverInput.addEventListener('input', () => {
  localStorage.setItem('crun-server', serverInput.value.trim());
});
serverInput.addEventListener('keypress', (e) => {
  if (e.key === 'Enter') {
    e.preventDefault();
    const url = serverInput.value.trim();
    if (url) connect(url);
  }
});

// AUTO-CONEXAO: usa URL salva, senao usa a padrao do Render
const savedUrl = localStorage.getItem('crun-server');
const urlToUse = savedUrl || DEFAULT_SERVER;
serverInput.value = urlToUse;
connect(urlToUse);

// ── Buttons ──
document.getElementById('btn-run').addEventListener('click', () => {
  if (!editor) return;
  term.reset();
  inputBuffer = '';
  wsSend('run', editor.getValue());
});

document.getElementById('btn-stop').addEventListener('click', () => {
  wsSend('kill', null);
});

document.getElementById('btn-clear').addEventListener('click', () => {
  term.reset();
});
</script>
</body>
</html>
